<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0a0a0c; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        h2 { color: #00c3ff; margin: 5px 0; text-transform: uppercase; letter-spacing: 2px; font-size: 20px; }
        .desc { color: #666; font-size: 13px; margin-bottom: 15px; }

        /* КОНТЕЙНЕР КАРТЫ */
        .map-container {
            position: relative;
            width: 320px;
            height: 400px;
            background: #121216;
            border: 1px solid #222;
            border-radius: 24px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* Стены и декор */
        .wall { position: absolute; background: #1c1c22; }
        .wall-v { width: 4px; height: 100%; top: 0; }
        .wall-h { height: 4px; width: 100%; left: 0; }

        /* СТОЛЫ */
        .table {
            position: absolute;
            background: #1a1a20;
            border: 2px solid #333;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: bold;
            font-size: 12px;
            color: #444;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Эффект при наведении/выборе */
        .table:active { transform: scale(0.95); }
        .table.selected {
            border-color: #00c3ff;
            color: #00c3ff;
            background: #1a262b;
            box-shadow: 0 0 20px rgba(0, 195, 255, 0.4), inset 0 0 10px rgba(0, 195, 255, 0.2);
            text-shadow: 0 0 5px #00c3ff;
        }

        /* Позиции столов */
        .t1 { width: 50px; height: 50px; top: 40px; left: 40px; }
        .t2 { width: 50px; height: 50px; top: 40px; right: 40px; }
        .t3 { width: 100px; height: 60px; top: 170px; left: 110px; border-radius: 30px; border-style: double; border-width: 4px; } /* VIP */
        .t4 { width: 50px; height: 50px; bottom: 40px; left: 40px; }
        .t5 { width: 50px; height: 50px; bottom: 40px; right: 40px; }

        /* ИНТЕРФЕЙС */
        .controls { width: 100%; max-width: 320px; margin-top: 20px; }
        .time-box {
            background: #16161e;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        input[type="time"] {
            background: #0a0a0c;
            border: 1px solid #333;
            color: #00c3ff;
            padding: 8px;
            border-radius: 8px;
            font-family: inherit;
            outline: none;
        }
        .order-btn {
            width: 100%;
            background: linear-gradient(135deg, #00c3ff, #0077ff);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 195, 255, 0.3);
        }
    </style>
</head>
<body>

    <h2>Smoke Reserve</h2>
    <div class="desc">Выберите место на карте зала</div>

    <div class="map-container">
        <div class="wall wall-v" style="left: 0; opacity: 0.3;"></div>

> Дизайнер:
<div class="wall wall-h" style="top: 0; opacity: 0.3;"></div>
        
        <div class="table t1" onclick="sel(this, '1')">№1</div>
        <div class="table t2" onclick="sel(this, '2')">№2</div>
        <div class="table t3" onclick="sel(this, 'VIP')">VIP</div>
        <div class="table t4" onclick="sel(this, '3')">№3</div>
        <div class="table t5" onclick="sel(this, '4')">№4</div>
    </div>

    <div class="controls">
        <div class="time-box">
            <span style="font-size: 14px; font-weight: 500;">Время визита:</span>
            <input type="time" id="time" value="20:00">
        </div>
        <button class="order-btn" onclick="send()">Забронировать</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#0a0a0c';
        
        let selected = null;

        function sel(el, id) {
            document.querySelectorAll('.table').forEach(t => t.classList.remove('selected'));
            el.classList.add('selected');
            selected = id;
            tg.HapticFeedback.impactOccurred('medium');
        }

        function send() {
            const time = document.getElementById('time').value;
            if (!selected) {
                tg.showAlert("Сначала выберите столик!");
                return;
            }
            tg.sendData(selected + "_" + time);
        }
    </script>
</body>
</html>
