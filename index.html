<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main: #00c3ff; --bg: #0a0a0c; --card: #16161e; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .step { display: none; width: 100%; flex-direction: column; align-items: center; }
        .step.active { display: flex; animation: fadeIn 0.2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        h2 { color: var(--main); text-transform: uppercase; margin: 10px 0; font-size: 18px; text-align: center; }
        .desc { color: #666; font-size: 12px; margin-bottom: 20px; text-align: center; }

        /* КАРТА ЗАЛА */
        .map { position: relative; width: 300px; height: 300px; background: #111; border-radius: 20px; border: 1px solid #222; margin-bottom: 20px; }
        .table { position: absolute; background: #1a1a20; border: 2px solid #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .table.selected { border-color: var(--main); color: var(--main); box-shadow: 0 0 15px var(--main); background: #1a262b; }

        /* ВЫБОР КРЕПОСТИ */
        .strength-box { display: flex; gap: 8px; width: 100%; margin-bottom: 20px; }
        .str-opt { flex: 1; padding: 12px; background: var(--card); border: 1px solid #333; border-radius: 10px; text-align: center; font-weight: bold; color: #777; }
        .str-opt.selected { border-color: var(--main); color: var(--main); background: #1a262b; }

        /* СЕТКА ТОВАРОВ */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 100px; }
        .item { background: var(--card); border: 1px solid #222; padding: 15px; border-radius: 15px; text-align: center; font-size: 14px; transition: 0.2s; }
        .item.selected { border-color: var(--main); background: #1a262b; }

        /* НАВИГАЦИЯ */
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg); padding: 15px; box-sizing: border-box; display: flex; gap: 10px; border-top: 1px solid #222; }
        .btn { flex: 1; padding: 16px; border-radius: 12px; font-weight: bold; border: none; font-size: 14px; text-transform: uppercase; cursor: pointer; }
        .btn-next { background: var(--main); color: #000; }
        .btn-back { background: #222; color: #888; }
        
        input[type="time"] { background: var(--card); color: var(--main); border: 1px solid #333; padding: 10px; border-radius: 10px; font-size: 20px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="s1" class="step active">
        <h2>Выберите столик</h2>
        <div class="desc">Нажмите на стол на схеме</div>
        <div class="map">
            <div class="table selected" style="width:45px;height:45px;top:20px;left:20px;" onclick="sel('table','1',this)">№1</div>
            <div class="table" style="width:45px;height:45px;top:20px;right:20px;" onclick="sel('table','2',this)">№2</div>
            <div class="table" style="width:80px;height:50px;top:125px;left:110px;border-radius:25px;" onclick="sel('table','VIP',this)">VIP</div>
            <div class="table" style="width:45px;height:45px;bottom:20px;left:20px;" onclick="sel('table','3',this)">№3</div>
            <div class="table" style="width:45px;height:45px;bottom:20px;right:20px;" onclick="sel('table','4',this)">№4</div>
        </div>
        <input type="time" id="time_pick" value="20:00">
        <div class="footer"><button class="btn btn-next" onclick="go(2)">Далее</button></div>
    </div>

    <div id="s2" class="step">
        <h2>Кальян</h2>
        <div class="desc">Крепость и вкус</div>
        <div class="strength-box">
            <div class="str-opt selected" onclick="sel('str','Легкий',this)">Легкий</div>
            <div class="str-opt" onclick="sel('str','Средний',this)">Средний</div>
            <div class="str-opt" onclick="sel('str','Крепкий',this)">Крепкий</div>
        </div>
        <div class="grid">
            <div class="item" onclick="sel('flavor','Pinkman',this)">Pinkman</div>
            <div class="item" onclick="sel('flavor','Love 66',this)">Love 66</div>
            <div class="item" onclick="sel('flavor','Bananan',this)">Банан-Клубника</div>
            <div class="item" onclick="sel('flavor','Blueberry Ice',this)">Черника Лед</div>
        </div>
        <div class="footer">
            <button class="btn btn-back" onclick="go(1)">Назад</button>
            <button class="btn btn-next" onclick="go(3)">Далее</button>
        </div>
    </div>

    <div id="s3" class="step">
        <h2>Напитки и еда</h2>
        <div class="desc">По желанию (можно пропустить)</div>
        <div class="grid">
            <div class="item" onclick="sel('drink','Кола',this)">Кола 0.5</div>
            <div class="item" onclick="sel('drink','Чайник чая',this)">Чайник чая</div>
            <div class="item" onclick="sel('snack','Чипсы',this)">Чипсы</div>
            <div class="item" onclick="sel('snack','Орешки',this)">Орешки</div>
        </div>
        <div class="footer">
            <button class="btn btn-back" onclick="go(2)">Назад</button>
            <button class="btn btn-next" onclick="finish()">Заказать</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let order = { table:'1', time:'20:00', str:'Легкий', flavor:'', drink:'-', snack:'-' };

        function sel(type, val, el) {
            order[type] = val;
            let items = el.parentElement.querySelectorAll('.item, .str-opt, .table');
            items.forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            tg.HapticFeedback.impactOccurred('light');
        }

        function go(step) {
            if (step === 3 && order.flavor === '') {
                tg.showAlert("Пожалуйста, выбери вкус кальяна!");
                return;
            }
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('s' + step).classList.add('active');
            window.scrollTo(0,0);
        }

        function finish() {
            order.time = document.getElementById('time_pick').value;
            let data = `${order.table}|${order.time}|${order.str}|${order.flavor}|${order.drink}|${order.snack}`;
            tg.sendData(data);
        }
    </script>
</body>
</html>
