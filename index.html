<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0a0a0c; color: white; font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .step { display: none; width: 100%; flex-direction: column; align-items: center; }
        .step.active { display: flex; }
        h2 { color: #00c3ff; text-transform: uppercase; margin: 10px 0; }
        .map { position: relative; width: 300px; height: 320px; background: #121216; border-radius: 20px; border: 1px solid #222; margin-bottom: 20px; }
        .table { position: absolute; background: #1a1a20; border: 2px solid #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer; }
        .table.selected { border-color: #00c3ff; box-shadow: 0 0 15px #00c3ff; color: #00c3ff; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .card { background: #16161e; border: 1px solid #222; padding: 15px; border-radius: 15px; text-align: center; }
        .card.selected { border-color: #00c3ff; background: #1a262b; }
        .btn { width: 100%; padding: 18px; border-radius: 12px; background: #00c3ff; color: black; font-weight: bold; border: none; margin-top: 20px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="s1" class="step active">
        <h2>SMOKE RESERVE</h2>
        <div class="map">
            <div class="table selected" style="width:45px;height:45px;top:20px;left:20px;" onclick="sel('table','1',this)">№1</div>
            <div class="table" style="width:45px;height:45px;top:20px;right:20px;" onclick="sel('table','2',this)">№2</div>
            <div class="table" style="width:80px;height:50px;top:135px;left:110px;border-radius:25px;" onclick="sel('table','VIP',this)">VIP</div>
            <div class="table" style="width:45px;height:45px;bottom:20px;left:20px;" onclick="sel('table','3',this)">№3</div>
            <div class="table" style="width:45px;height:45px;bottom:20px;right:20px;" onclick="sel('table','4',this)">№4</div>
        </div>
        <input type="time" id="tm" value="20:00" style="background:#16161e; color:#00c3ff; border:1px solid #333; padding:10px; border-radius:10px; font-size:20px;">
        <button class="btn" onclick="go(2)">Далее</button>
    </div>

    <div id="s2" class="step">
        <h2>ВЫБОР ВКУСА</h2>
        <div class="grid">
            <div class="card" onclick="sel('flavor','Pinkman',this)">Pinkman</div>
            <div class="card" onclick="sel('flavor','Love 66',this)">Love 66</div>
            <div class="card" onclick="sel('flavor','Apple',this)">Яблоко</div>
            <div class="card" onclick="sel('flavor','Mint',this)">Мята</div>
        </div>
        <button class="btn" onclick="finish()">Забронировать</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let order = { table:'1', time:'20:00', flavor:'' };

        function sel(type, val, el) {
            order[type] = val;
            let p = el.parentElement;
            p.querySelectorAll('.table, .card').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        }

        function go(step) {
            document.getElementById('s1').classList.remove('active');
            document.getElementById('s' + step).classList.add('active');
        }

        function finish() {
            order.time = document.getElementById('tm').value;
            if(!order.flavor) { alert("Выбери вкус!"); return; }
            let res = `${order.table}|${order.time}|Средний|${order.flavor}|-|-`;
            tg.sendData(res);
        }
    </script>
</body>
</html>
