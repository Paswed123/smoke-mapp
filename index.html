<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0b0e; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .map-container { position: relative; display: inline-block; width: 100%; max-width: 500px; border-radius: 15px; border: 2px solid #00c3ff; padding: 10px; box-shadow: 0 0 20px rgba(0,195,255,0.2); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        button { background: #1a1a1f; border: 1px solid #00c3ff; color: white; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:active { background: #00c3ff; color: black; }
        h2 { color: #00c3ff; text-shadow: 0 0 10px rgba(0,195,255,0.5); }
    </style>
</head>
<body>
    <h2>SMOKE RESERVE</h2>
    <p>Выберите свободный столик:</p>
    <div class="map-container">
        <div class="grid">
            <button onclick="sendData('table_1')">СТОЛ 1</button>
            <button onclick="sendData('table_2')">СТОЛ 2</button>
            <button onclick="sendData('table_3')">СТОЛ 3</button>
            <button onclick="sendData('table_4')">СТОЛ 4</button>
            <button onclick="sendData('table_5')">СТОЛ 5</button>
            <button onclick="sendData('table_6')">СТОЛ 6</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем окно

        function sendData(tableId) {
            tg.sendData(tableId); // Отправляем данные боту
            tg.close(); // Закрываем Mini App
        }
    </script>
</body>
</html>
