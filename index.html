<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #00c3ff; --bg: #0d0d12; --card: #1a1a24; --text: #ffffff; --ps: #ff9f0a; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { text-align: center; padding: 10px; }
        .header h2 { color: var(--accent); margin: 0; font-size: 18px; text-transform: uppercase; }

        /* Контейнер с прокруткой для зума */
        .map-viewport { flex: 1; overflow: auto; border: 1px solid #333; border-radius: 15px; background: #08080a; position: relative; margin-bottom: 70px; }
        
        .map-canvas { width: 800px; height: 600px; position: relative; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; }

        /* Стили столов */
        .table { position: absolute; background: var(--card); border: 2px solid #444; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .table.selected { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); background: #1a2a35; }
        .table span { font-size: 10px; color: var(--ps); margin-top: 4px; }

        /* Служебные зоны */
        .zone { position: absolute; background: rgba(255,255,255,0.05); border: 1px dashed #555; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #777; text-transform: uppercase; text-align: center; }
        .zone.staff { border: 1px solid rgba(0, 195, 255, 0.2); color: var(--accent); }

        /* Кнопка */
        .footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px; background: var(--bg); }
        .btn { width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 15px; font-weight: bold; font-size: 16px; color: #000; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Smoke Reserve</h2>
        <p style="font-size: 11px; color: #777;">Выберите стол (можно приближать)</p>
    </div>

    <div class="map-viewport">
        <div class="map-canvas">
            <div class="table" style="top:20px; left:20px; width:70px; height:70px;" onclick="sel('Стол 1', this)">1</div>
            <div class="table" style="top:110px; left:20px; width:70px; height:70px;" onclick="sel('Стол 2', this)">2</div>
            <div class="table" style="top:200px; left:20px; width:70px; height:70px;" onclick="sel('Стол 3', this)">3</div>
            <div class="table" style="top:290px; left:20px; width:70px; height:70px;" onclick="sel('Стол 4', this)">4</div>

            <div class="table" style="top:20px; left:120px; width:80px; height:80px;" onclick="sel('Стол 5 (PS)', this)">5 <span>+200₽/ч</span></div>
            <div class="table" style="top:120px; left:120px; width:80px; height:80px;" onclick="sel('Стол 6 (PS)', this)">6 <span>+200₽/ч</span></div>

            <div class="zone" style="top:20px; left:230px; width:100px; height:60px;">ТУАЛЕТ</div>
            <div class="zone" style="top:90px; left:230px; width:100px; height:80px;">ГАРДЕРОБ</div>

            <div class="table" style="top:20px; left:350px; width:70px; height:70px;" onclick="sel('Стол 7', this)">7</div>
            <div class="table" style="top:20px; left:440px; width:70px; height:70px;" onclick="sel('Стол 8', this)">8</div>
            <div class="table" style="top:110px; left:350px; width:160px; height:120px; border-radius: 20px;" onclick="sel('VIP Lounge', this)">VIP</div>

            <div class="zone staff" style="top:320px; left:350px; width:120px; height:60px;">БАРМЕН</div>
            <div class="zone staff" style="top:320px; left:480px; width:120px; height:60px;">КАЛЬЯНЩИК</div>

            <div class="zone" style="top:500px; left:200px; width:150px; height:40px; border: 2px solid #333;">ВХОД</div>
        </div>
    </div>

    <div class="footer">
        <button class="btn" onclick="send()">ЗАБРОНИРОВАТЬ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let selected = "Не выбран";

        function sel(name, el) {
            selected = name;
            document.querySelectorAll('.table').forEach(t => t.classList.remove('selected'));
            el.classList.add('selected');
            tg.HapticFeedback.impactOccurred('medium');
        }

        function send() {
            if(selected === "Не выбран") {
                tg.showAlert("Пожалуйста, выберите столик на карте!");
                return;
            }
            tg.sendData(selected);
        }
    </script>
</body>
</html>
