<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0b0e; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 15px; }
        .map-container { position: relative; display: inline-block; width: 100%; max-width: 500px; border-radius: 15px; overflow: hidden; border: 2px solid #00c3ff; box-shadow: 0 0 20px rgba(0,195,255,0.2); }
        img { width: 100%; display: block; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        button { background: #1a1a1f; border: 1px solid #00c3ff; color: white; padding: 12px; border-radius: 8px; font-size: 14px; transition: 0.3s; }
        button:active { background: #00c3ff; transform: scale(0.95); }
        h3 { margin-bottom: 15px; font-weight: 300; letter-spacing: 1px; }
    </style>
</head>
<body>
    <h3>SMOKE RESERVE</h3>
    <div class="map-container">
        <img src="https://i.ibb.co/1JmRjX5b/hookah-map.jpg" alt="Map">
    </div>
    
    <div class="grid">
        <button onclick="selectStore(1)">Стол 1</button>
        <button onclick="selectStore(2)">Стол 2</button>
        <button onclick="selectStore(3)">Стол 3</button>
        <button onclick="selectStore(4)">Стол 4</button>
        <button onclick="selectStore(5)">Стол 5</button>
        <button onclick="selectStore(6)">Стол 6</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран
        tg.MainButton.hide();

        function selectStore(num) {
            // Отправляем данные боту
            tg.sendData("table_" + num);
            tg.close();
        }
    </script>
</body>
</html>
